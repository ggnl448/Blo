<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks & Notes & Design</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e27;
      --surface: #0f1437;
      --border: #1a1f4a;
      --text: #a0adc7;
      --text-light: #d4d9eb;
      --accent-blue: #6b8aff;
      --accent-cyan: #00d9ff;
      --accent-purple: #9966ff;
      --accent-green: #4ade80;
      --accent-yellow: #fbbf24;
      --accent-red: #f87171;
    }

    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0a0e27 0%, #0f0f2e 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ===== Connection Warning ===== */
    #connWarning {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid var(--accent-red);
      color: #ffb3b3;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 0.85rem;
      z-index: 9999;
      backdrop-filter: blur(10px);
      transition: transform 0.35s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #connWarning.show { transform: translateX(-50%) translateY(0); }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 34px 20px 22px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6b8aff, #9966ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.6;
    }

    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 110px;
      position: relative;
      z-index: 1;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ===== Stats Section (Tasks) ===== */
    .stats-section {
      background: rgba(15, 20, 55, 0.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .progress-circle { flex-shrink: 0; width: 110px; height: 110px; position: relative; }
    .circle-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .circle-progress { fill: none; stroke: var(--accent-purple); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
    .circle-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; color: var(--accent-purple); }
    .stats-info { flex: 1; }
    .stat-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); opacity: 0.6; margin-bottom: 8px; }
    .stat-value { font-size: 1.05rem; color: var(--text-light); font-weight: 500; }

    .stats-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-radius: 14px; padding: 18px; text-align: center; border-top: 3px solid transparent; }
    .stat-card.all { border-top-color: var(--accent-cyan); }
    .stat-card.active { border-top-color: var(--accent-purple); }
    .stat-card.done { border-top-color: var(--accent-green); }
    .stat-card-number { font-size: 1.9rem; font-weight: 700; color: var(--accent-cyan); margin-bottom: 4px; }
    .stat-card.active .stat-card-number { color: var(--accent-purple); }
    .stat-card.done .stat-card-number { color: var(--accent-green); }
    .stat-card-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); opacity: 0.6; }

    .completion-bar { background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .completion-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); opacity: 0.7; }
    .completion-percent { font-size: 0.9rem; font-weight: 600; color: var(--accent-cyan); }

    /* ===== Add Bars (shared style) ===== */
    .add-bar { display: flex; gap: 10px; margin-bottom: 24px; background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; backdrop-filter: blur(10px); transition: border-color 0.2s, background 0.2s; }
    .add-bar:focus-within { border-color: var(--accent-purple); background: rgba(15, 20, 55, 0.8); }
    .add-bar input[type="text"], .add-bar textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text-light); font-size: 0.95rem; letter-spacing: -0.01em; font-family: inherit; resize: none; }
    .add-bar input::placeholder, .add-bar textarea::placeholder { color: #5a6788; }

    .color-dots { display: flex; gap: 8px; align-items: center; }
    .color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
    .color-dot:hover { transform: scale(1.1); }
    .color-dot.active { border-color: var(--text-light); }
    .dot-green { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-red { background: #f87171; }

    .btn-add { background: linear-gradient(135deg, #6b8aff, #9966ff); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 600; padding: 10px 16px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; min-width: 48px; height: 48px; flex-shrink: 0; }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.95); }

    /* ===== Filter Tabs ===== */
    .filter-tabs { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
    .filter-tab { background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-radius: 20px; color: var(--text); padding: 8px 16px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; transition: all 0.15s; }
    .filter-tab.active { background: rgba(107, 138, 255, 0.15); border-color: var(--accent-blue); color: var(--accent-cyan); }

    /* ===== Task / Note Cards ===== */
    .cards-list { display: flex; flex-direction: column; gap: 12px; }
    .card { background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-left: 4px solid transparent; border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; animation: cardIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; transition: transform 0.18s, background 0.18s, opacity 0.18s; cursor: pointer; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
    .card:hover { transform: translateY(-2px); background: rgba(15, 20, 55, 0.8); }
    .card-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .card-color.green { background: #4ade80; border-left-color: #4ade80; }
    .card-color.yellow { background: #fbbf24; border-left-color: #fbbf24; }
    .card-color.red { background: #f87171; border-left-color: #f87171; }
    .card-checkbox { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; font-size: 0.75rem; color: white; }
    .card.completed .card-checkbox { background: var(--accent-green); border-color: var(--accent-green); }
    .card-text { flex: 1; font-size: 0.9rem; color: var(--text-light); text-align: left; word-break: break-word; }
    .card.completed .card-text { color: var(--text); text-decoration: line-through; opacity: 0.6; }
    .card-actions { display: flex; gap: 8px; }
    .btn-icon { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; transition: background 0.15s, color 0.15s, border-color 0.15s; flex-shrink: 0; }
    .btn-icon:hover { background: rgba(107, 138, 255, 0.1); color: var(--accent-blue); border-color: var(--accent-blue); }
    .btn-icon.delete:hover { background: rgba(248, 113, 113, 0.1); color: #f87171; border-color: #f87171; }

    .note-card { flex-direction: column; align-items: stretch; cursor: default; }
    .note-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .note-text { font-size: 0.88rem; color: var(--text-light); line-height: 1.55; white-space: pre-wrap; word-break: break-word; margin-top: 6px; }
    .note-date { font-size: 0.65rem; color: var(--text); opacity: 0.5; margin-top: 10px; }
    .note-card textarea.edit-area { background: rgba(10,14,39,0.8); border: 1px solid var(--accent-blue); border-radius: 8px; color: var(--text-light); font-family: inherit; font-size: 0.88rem; padding: 8px; width: 100%; min-height: 70px; margin-top: 6px; }

    .empty { text-align: center; padding: 60px 20px; color: var(--text); }
    .empty-star { font-size: 3rem; margin-bottom: 16px; opacity: 0.6; }
    .empty-title { font-size: 0.95rem; color: var(--text-light); font-weight: 500; }

    /* ===== Design Editor ===== */
    .design-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tool-btn { background: rgba(15, 20, 55, 0.6); border: 1px solid var(--border); border-radius: 10px; color: var(--text-light); padding: 9px 14px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .tool-btn:hover { border-color: var(--accent-blue); color: var(--accent-cyan); }
    .tool-btn.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }
    .tool-input-color { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; padding: 0; }

    #canvasWrap {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      width: 100%;
      height: 460px;
      border: 1px solid var(--border);
      touch-action: none;
    }

    .canvas-el {
      position: absolute;
      cursor: move;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .canvas-el.selected { outline: 2px solid #6b8aff; outline-offset: 2px; }
    .canvas-el img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .canvas-el .text-content { width: 100%; height: 100%; outline: none; overflow: hidden; color: #111; font-size: 16px; }
    .resize-handle {
      position: absolute;
      width: 14px; height: 14px;
      background: #6b8aff;
      border: 2px solid #fff;
      border-radius: 50%;
      right: -7px; bottom: -7px;
      cursor: nwse-resize;
    }

    .design-hint { font-size: 0.72rem; color: var(--text); opacity: 0.55; margin-top: 10px; text-align: center; }

    /* ===== Bottom Navigation ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10, 14, 39, 0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 500;
      padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px 8px;
      cursor: pointer;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      border-radius: 12px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-btn .nav-icon { font-size: 1.25rem; }
    .nav-btn.active { color: var(--accent-cyan); background: rgba(107, 138, 255, 0.08); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="connWarning">⚠️ Проверьте подключение к интернету</div>

<header>
  <div class="logo" id="pageLogo">TASKS</div>
  <div class="subtitle" id="pageSubtitle">Task Manager</div>
</header>

<div class="main">

  <!-- ============ PAGE 1: TASKS ============ -->
  <section class="page active" id="page-tasks">
    <div class="stats-section">
      <div class="progress-circle">
        <svg class="circle-svg" viewBox="0 0 120 120">
          <circle class="circle-bg" cx="60" cy="60" r="50"/>
          <circle class="circle-progress" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314" id="progressCircle"/>
        </svg>
        <div class="circle-text" id="percentageText">0%</div>
      </div>
      <div class="stats-info">
        <div class="stat-label">Прогресс задач</div>
        <div class="stat-value" id="progressLabel">0 из 0 выполнено</div>
      </div>
    </div>

    <div class="stats-cards">
      <div class="stat-card all"><div class="stat-card-number" id="countAll">0</div><div class="stat-card-label">Всего</div></div>
      <div class="stat-card active"><div class="stat-card-number" id="countActive">0</div><div class="stat-card-label">Активных</div></div>
      <div class="stat-card done"><div class="stat-card-number" id="countDone">0</div><div class="stat-card-label">Готово</div></div>
    </div>

    <div class="completion-bar">
      <span class="completion-label">Выполнение задач</span>
      <span class="completion-percent" id="completionPercent">0%</span>
    </div>

    <div class="add-bar">
      <input type="text" id="noteInput" placeholder="Новая задача…" maxlength="300" />
      <div class="color-dots">
        <div class="color-dot dot-green active" data-color="green" onclick="setColor('green')"></div>
        <div class="color-dot dot-yellow" data-color="yellow" onclick="setColor('yellow')"></div>
        <div class="color-dot dot-red" data-color="red" onclick="setColor('red')"></div>
      </div>
      <button class="btn-add" onclick="addTask()">+</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', event)">Все</button>
      <button class="filter-tab" onclick="setFilter('active', event)">Активные</button>
      <button class="filter-tab" onclick="setFilter('completed', event)">Готово</button>
    </div>

    <div class="cards-list" id="tasksList"></div>
  </section>

  <!-- ============ PAGE 2: NOTES ============ -->
  <section class="page" id="page-notes">
    <div class="add-bar" style="align-items: flex-start;">
      <textarea id="noteTextInput" placeholder="Новая заметка…" rows="2" maxlength="2000"></textarea>
      <button class="btn-add" onclick="addNoteEntry()">+</button>
    </div>
    <div class="cards-list" id="notesList"></div>
  </section>

  <!-- ============ PAGE 3: DESIGN ============ -->
  <section class="page" id="page-design">
    <div class="design-toolbar">
      <button class="tool-btn" onclick="addShape('rect')">▭ Прямоугольник</button>
      <button class="tool-btn" onclick="addShape('circle')">◯ Круг</button>
      <button class="tool-btn" onclick="addShape('text')">🔤 Текст</button>
      <button class="tool-btn" onclick="triggerImageUpload()">🖼 Фото</button>
      <input type="color" class="tool-input-color" id="colorPicker" value="#6b8aff" onchange="applyColor(this.value)" title="Цвет" />
      <button class="tool-btn" onclick="bringForward()">⬆ Вперёд</button>
      <button class="tool-btn" onclick="sendBackward()">⬇ Назад</button>
      <button class="tool-btn danger" onclick="deleteSelected()">🗑 Удалить</button>
      <button class="tool-btn" onclick="clearCanvas()">✨ Очистить</button>
      <button class="tool-btn" onclick="exportCanvas()">⬇ Экспорт PNG</button>
    </div>
    <input type="file" id="imageUploadInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
    <div id="canvasWrap"></div>
    <div class="design-hint">Перетаскивайте элементы, тяните за синюю точку для изменения размера. Клик — выделить.</div>
  </section>

</div>

<!-- ============ BOTTOM NAV ============ -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-tasks" onclick="switchPage('tasks')">
    <span class="nav-icon">📋</span>Задачи
  </button>
  <button class="nav-btn" id="nav-notes" onclick="switchPage('notes')">
    <span class="nav-icon">📝</span>Заметки
  </button>
  <button class="nav-btn" id="nav-design" onclick="switchPage('design')">
    <span class="nav-icon">🎨</span>Дизайн
  </button>
</div>

<script>
  /* ================= CONNECTION WATCHDOG ================= */
  (function() {
    var loaded = false;
    window.addEventListener('load', function() { loaded = true; });
    setTimeout(function() {
      if (!loaded || (navigator && navigator.onLine === false)) {
        var el = document.getElementById('connWarning');
        el.classList.add('show');
        setTimeout(function() { el.classList.remove('show'); }, 6000);
      }
    }, 5000);
    window.addEventListener('offline', function() {
      var el = document.getElementById('connWarning');
      el.classList.add('show');
    });
    window.addEventListener('online', function() {
      document.getElementById('connWarning').classList.remove('show');
    });
  })();

  /* ================= PAGE SWITCHING ================= */
  const pageMeta = {
    tasks:  { logo: 'TASKS',  subtitle: 'Task Manager' },
    notes:  { logo: 'NOTES',  subtitle: 'Quick Notes' },
    design: { logo: 'DESIGN', subtitle: 'Design Editor' }
  };

  function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + name).classList.add('active');
    document.getElementById('pageLogo').textContent = pageMeta[name].logo;
    document.getElementById('pageSubtitle').textContent = pageMeta[name].subtitle;
  }

  /* ================= TASKS ================= */
  let tasks = JSON.parse(localStorage.getItem('tasks_manager') || '[]');
  let currentColor = 'green';
  let currentFilter = 'all';

  function saveTasks() {
    localStorage.setItem('tasks_manager', JSON.stringify(tasks));
    updateStats();
    renderTasks();
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const active = total - completed;
    const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

    document.getElementById('countAll').textContent = total;
    document.getElementById('countActive').textContent = active;
    document.getElementById('countDone').textContent = completed;
    document.getElementById('percentageText').textContent = percentage + '%';
    document.getElementById('progressLabel').textContent = `${completed} из ${total} выполнено`;
    document.getElementById('completionPercent').textContent = percentage + '%';

    const circumference = 2 * Math.PI * 50;
    const offset = circumference - (percentage / 100) * circumference;
    document.getElementById('progressCircle').style.strokeDashoffset
