<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e27;
      --surface: #0f1437;
      --border: #1a1f4a;
      --text: #a0adc7;
      --text-light: #d4d9eb;
      --accent-blue: #6b8aff;
      --accent-cyan: #00d9ff;
      --accent-purple: #9966ff;
      --accent-green: #4ade80;
      --accent-yellow: #fbbf24;
      --accent-red: #f87171;
    }

    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0a0e27 0%, #0f0f2e 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 40px 20px 30px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6b8aff, #9966ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.6;
    }

    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 100px;
      position: relative;
      z-index: 1;
    }

    /* Stats Section */
    .stats-section {
      background: rgba(15, 20, 55, 0.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .progress-circle {
      flex-shrink: 0;
      width: 120px;
      height: 120px;
      position: relative;
    }

    .circle-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .circle-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 8;
    }

    .circle-progress {
      fill: none;
      stroke: var(--accent-purple);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease;
    }

    .circle-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-purple);
    }

    .stats-info {
      flex: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.6;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.1rem;
      color: var(--text-light);
      font-weight: 500;
    }

    /* Stats Cards */
    .stats-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(15, 20, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      border-top: 3px solid transparent;
    }

    .stat-card.all { border-top-color: var(--accent-cyan); }
    .stat-card.active { border-top-color: var(--accent-purple); }
    .stat-card.done { border-top-color: var(--accent-green); }

    .stat-card-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }

    .stat-card.active .stat-card-number { color: var(--accent-purple); }
    .stat-card.done .stat-card-number { color: var(--accent-green); }

    .stat-card-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.6;
    }

    /* Task Completion Bar */
    .completion-bar {
      background: rgba(15, 20, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .completion-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.7;
    }

    .completion-percent {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-cyan);
    }

    /* Add Task Bar */
    .add-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      background: rgba(15, 20, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, background 0.2s;
    }

    .add-bar:focus-within {
      border-color: var(--accent-purple);
      background: rgba(15, 20, 55, 0.8);
    }

    .add-bar input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-light);
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }

    .add-bar input::placeholder { 
      color: #5a6788;
    }

    .color-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .color-dot:hover {
      transform: scale(1.1);
    }

    .color-dot.active {
      border-color: var(--text-light);
    }

    .dot-green { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-red { background: #f87171; }

    .btn-add {
      background: linear-gradient(135deg, #6b8aff, #9966ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 48px;
    }

    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.95); }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .filter-tab {
      background: rgba(15, 20, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .filter-tab.active {
      background: rgba(107, 138, 255, 0.15);
      border-color: var(--accent-blue);
      color: var(--accent-cyan);
    }

    /* Tasks List */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: rgba(15, 20, 55, 0.6);
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: cardIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transition: transform 0.18s, background 0.18s, opacity 0.18s;
      cursor: pointer;
    }

    @keyframes cardIn {
      from { 
        opacity: 0; 
        transform: translateY(10px) scale(0.98); 
      }
      to { 
        opacity: 1; 
        transform: none; 
      }
    }

    .card:hover {
      transform: translateY(-2px);
      background: rgba(15, 20, 55, 0.8);
    }

    .card-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-color.green { background: #4ade80; border-left-color: #4ade80; }
    .card-color.yellow { background: #fbbf24; border-left-color: #fbbf24; }
    .card-color.red { background: #f87171; border-left-color: #f87171; }

    .card-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      cursor: pointer;
    }

    .card.completed .card-checkbox {
      background: var(--accent-green);
      border-color: var(--accent-green);
      font-size: 0.75rem;
      color: white;
    }

    .card-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-light);
      text-align: left;
      word-break: break-word;
    }

    .card.completed .card-text {
      color: var(--text);
      text-decoration: line-through;
      opacity: 0.6;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-icon:hover { 
      background: rgba(107, 138, 255, 0.1);
      color: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .btn-icon.delete:hover { 
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border-color: #f87171;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text);
    }

    .empty-star {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-title {
      font-size: 0.95rem;
      color: var(--text-light);
      font-weight: 500;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">TASKS</div>
  <div class="subtitle">Task Manager</div>
</header>

<div class="main">
  <!-- Stats Section -->
  <div class="stats-section">
    <div class="progress-circle">
      <svg class="circle-svg" viewBox="0 0 120 120">
        <circle class="circle-bg" cx="60" cy="60" r="50"/>
        <circle class="circle-progress" cx="60" cy="60" r="50" 
                stroke-dasharray="314" stroke-dashoffset="314" id="progressCircle"/>
      </svg>
      <div class="circle-text" id="percentageText">0%</div>
    </div>
    <div class="stats-info">
      <div class="stat-label">Прогресс задач</div>
      <div class="stat-value" id="progressLabel">0 из 0 выполнено</div>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-cards">
    <div class="stat-card all">
      <div class="stat-card-number" id="countAll">0</div>
      <div class="stat-card-label">Всего</div>
    </div>
    <div class="stat-card active">
      <div class="stat-card-number" id="countActive">0</div>
      <div class="stat-card-label">Активных</div>
    </div>
    <div class="stat-card done">
      <div class="stat-card-number" id="countDone">0</div>
      <div class="stat-card-label">Готово</div>
    </div>
  </div>

  <!-- Completion Bar -->
  <div class="completion-bar">
    <span class="completion-label">Выполнение задач</span>
    <span class="completion-percent" id="completionPercent">0%</span>
  </div>

  <!-- Add Task -->
  <div class="add-bar">
    <input type="text" id="noteInput" placeholder="Новая задача…" maxlength="300" />
    <div class="color-dots">
      <div class="color-dot dot-green active" data-color="green" onclick="setColor('green')"></div>
      <div class="color-dot dot-yellow" data-color="yellow" onclick="setColor('yellow')"></div>
      <div class="color-dot dot-red" data-color="red" onclick="setColor('red')"></div>
    </div>
    <button class="btn-add" onclick="addTask()">+</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all')">Все</button>
    <button class="filter-tab" onclick="setFilter('active')">Активные</button>
    <button class="filter-tab" onclick="setFilter('completed')">Готово</button>
  </div>

  <!-- Tasks List -->
  <div class="cards-list" id="tasksList"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks_manager') || '[]');
  let currentColor = 'green';
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('tasks_manager', JSON.stringify(tasks));
    updateStats();
    render();
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const active = total - completed;
    const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

    document.getElementById('countAll').textContent = total;
    document.getElementById('countActive').textContent = active;
    document.getElementById('countDone').textContent = completed;
    document.getElementById('percentageText').textContent = percentage + '%';
    document.getElementById('progressLabel').textContent = `${completed} из ${total} выполнено`;
    document.getElementById('completionPercent').textContent = percentage + '%';

    // Update progress circle
    const circumference = 2 * Math.PI * 50;
    const offset = circumference - (percentage / 100) * circumference;
    document.getElementById('progressCircle').style.strokeDashoffset = offset;
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
    render();
  }

  function setColor(color) {
    currentColor = color;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    document.querySelector(`[data-color="${color}"]`).classList.add('active');
  }

  function addTask() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if (!text) { 
      input.focus(); 
      return; 
    }
    tasks.unshift({ 
      id: Date.now().toString(), 
      text, 
      color: currentColor,
      completed: false,
      createdAt: Date.now() 
    });
    save();
    input.value = '';
    input.focus();
  }

  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { 
      e.preventDefault(); 
      addTask(); 
    }
  });

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      save();
    }
  }

  function deleteTask(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.style.opacity = '0';
      card.style.transform = 'scale(0.93)';
      card.style.transition = 'opacity 0.2s, transform 0.2s';
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
      }, 200);
    }
  }

  function render() {
    const list = document.getElementById('tasksList');
    list.innerHTML = '';

    let filtered = tasks;
    if (currentFilter === 'active') {
      filtered = tasks.filter(t => !t.completed);
    } else if (currentFilter === 'completed') {
      filtered = tasks.filter(t => t.completed);
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-star">✨</div>
          <div class="empty-title">Список задач пуст</div>
        </div>
      `;
      return;
    }

    filtered.forEach(task => {
      const card = document.createElement('div');
      card.className = 'card' + (task.completed ? ' completed' : '');
      card.dataset.id = task.id;

      const colorDiv = document.createElement('div');
      colorDiv.className = `card-color ${task.color || 'green'}`;

      const checkbox = document.createElement('div');
      checkbox.className = 'card-checkbox';
      checkbox.innerHTML = task.completed ? '✓' : '';
      checkbox.onclick = (e) => { e.stopPropagation(); toggleTask(task.id); };
      card.onclick = () => toggleTask(task.id);

      const textDiv = document.createElement('div');
      textDiv.className = 'card-text';
      textDiv.textContent = task.text;

      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon delete';
      delBtn.innerHTML = '🗑';
      delBtn.onclick = (e) => { e.stopPropagation(); deleteTask(task.id); };

      actions.appendChild(delBtn);

      card.appendChild(colorDiv);
      card.appendChild(checkbox);
      card.appendChild(textDiv);
      card.appendChild(actions);
      list.appendChild(card);
    });
  }

  updateStats();
  render();
</script>
</body>
  </html>
